<!DOCTYPE html>
<html>
<body>
<div class="product">
  <h1 class="product-name break-word" itemprop="name">Sold Out Event 12.8.2026</h1>

  <div class="product-checkout row">
    <div class="col-md-5 product-price-container product-price-container-sold-out" itemprop="offers" itemscope="" itemtype="http://schema.org/Offer">
      <h1 class="product-price" itemprop="price">39.00&nbsp;EUR</h1>
      <span class="vat_notice smallp">Incl. VAT 13.50%</span>
      <span class="thincaps product-item-stock" itemprop="availability">
        <span class="text-red">Sold out</span>
      </span>
    </div>
  </div>

  <div class="row">
    <div class="product-description col-xs-12" itemprop="description">
      <p>Some description text.</p>
    </div>
  </div>
</div>
</body>
</html>
